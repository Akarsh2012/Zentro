name: CI

on:
  push:
    branches: [dev, prod, main]
  pull_request:
    branches: [dev, prod, main]

jobs:
  web:
    name: zentro-web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zentro-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: zentro-web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm build

  api:
    name: zentro-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: zentro-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build
