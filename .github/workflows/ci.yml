name: CI

on:
  push:
    branches: [dev, prod, main]
  pull_request:
    branches: [dev, prod, main]

jobs:
  web:
    name: zentro-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Runs full checks only once apps are scaffolded (have package.json + lockfile).
      - name: Detect bootstrap
        id: check
        run: |
          if ls zentro-web/apps/*/package.json >/dev/null 2>&1 && [ -f zentro-web/pnpm-lock.yaml ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "zentro-web not bootstrapped yet — skipping build checks."
          fi

      - if: steps.check.outputs.ready == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - if: steps.check.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: zentro-web/pnpm-lock.yaml
      - if: steps.check.outputs.ready == 'true'
        working-directory: zentro-web
        run: |
          pnpm install --frozen-lockfile
          pnpm lint
          pnpm typecheck
          pnpm build

  api:
    name: zentro-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Runs full build only once the Gradle wrapper is generated.
      - name: Detect bootstrap
        id: check
        run: |
          if [ -f zentro-api/gradlew ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "zentro-api not bootstrapped yet (no Gradle wrapper) — skipping build."
          fi

      - if: steps.check.outputs.ready == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - if: steps.check.outputs.ready == 'true'
        uses: gradle/actions/setup-gradle@v4
      - if: steps.check.outputs.ready == 'true'
        working-directory: zentro-api
        run: ./gradlew build
