spring:
  application:
    name: zentro-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/zentro}
    username: ${DB_USER:zentro}
    password: ${DB_PASSWORD:zentro}

  jpa:
    hibernate:
      ddl-auto: validate          # schema owned by Flyway, never auto-generated
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

# JWT / auth config placeholders (wired in the identity module)
zentro:
  security:
    jwt:
      issuer: zentro
      access-token-ttl: 15m
      refresh-token-ttl: 30d
